<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHCN Quản lý nhập liệu</title>
    <style>
        :root {
            --primary: #059669; 
            --primary-hover: #047857;
            --primary-light: #d1fae5;
            --bg-gradient: linear-gradient(135deg, #064e3b 0%, #0f766e 100%);
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; padding: 20px; color: var(--gray-800); display: flex; justify-content: center; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }

        .container { width: 100%; max-width: 1200px; animation: fadeIn 0.4s ease-out; }
        header { text-align: center; margin-bottom: 20px; color: var(--white); }
        header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; }

        #sync-status {
            display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600;
            background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; margin-top: 8px;
        }

        .date-wrapper { display: flex; justify-content: center; margin-bottom: 30px; }
        .date-badge {
            position: relative; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px);
            color: var(--white); padding: 10px 28px; border-radius: 30px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.25); display: inline-flex; align-items: center; gap: 8px;
        }
        .date-badge input[type="date"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .layout-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 900px) { .layout-2col { grid-template-columns: 1fr; } }

        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid rgba(255, 255, 255, 0.2); display: flex; align-items: center; gap: 8px; }
        .card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 20px; margin-bottom: 20px; }

        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--gray-800); }
        input[type="text"] { width: 100%; padding: 12px 16px; background: var(--gray-50); border: 2px solid transparent; border-radius: var(--radius-md); transition: var(--transition); }
        input[type="text"]:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-light); }

        .btn { padding: 12px 20px; border: none; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: white; border: 1.5px solid var(--gray-200); color: var(--gray-600); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .people-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .btn-person { padding: 8px 16px; border: 1.5px solid var(--gray-200); background: white; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px; transition: var(--transition); }
        .btn-person.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .table-container { overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--gray-200); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--gray-50); padding: 14px 16px; font-size: 12px; text-transform: uppercase; color: var(--gray-600); border-bottom: 2px solid var(--gray-200); text-align: left; }
        td { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); font-size: 14px; }

        .action-btns { display: flex; gap: 6px; }
        .btn-sm { padding: 4px 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; }
        .btn-edit { background: #dcfce7; color: #15803d; }
        .btn-del { background: #fee2e2; color: #b91c1c; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1f2937; color: white; padding: 12px 24px; border-radius: 30px; transition: var(--transition); opacity: 0; z-index: 999; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 24px; border-radius: var(--radius-lg); width: 90%; max-width: 400px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ KHCN Quản lý nhập liệu</h1>
        <div id="sync-status">⏳ Đang kết nối...</div>
    </header>

    <div class="date-wrapper">
        <div class="date-badge">
            <span id="dateDisplay">📅 Đang tải...</span>
            <input type="date" id="dateInput">
        </div>
    </div>

    <div class="layout-2col">
        <div>
            <div class="section-title">✍️ Nhập Liệu</div>
            <div class="card">
                <label>Nhập nhanh ([Tên] [Nhiệm vụ])</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="quickInput" placeholder="VD: Đạt Trà đào cam sả">
                    <button class="btn btn-primary" style="width: auto;" id="btnQuickAdd">Thêm</button>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <label style="margin-bottom: 0;">👥 Chọn người thực hiện</label>
                    <button class="btn-sm btn-edit" id="btnEditPeople">⚙️ Sửa DS</button>
                </div>
                <div class="people-buttons" id="peopleButtons"></div>
                <label>Nhiệm vụ / Ghi chú</label>
                <input type="text" id="taskInput" placeholder="Nhập chi tiết nhiệm vụ..." style="margin-bottom: 12px;">
                <button class="btn btn-primary" id="btnManualAdd">Lưu vào danh sách</button>
            </div>
        </div>

        <div>
            <div class="section-title">📊 Tổng Hợp</div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn btn-outline" style="flex: 1;" id="btnCopy">📋 Sao chép</button>
                <button class="btn btn-outline" style="flex: 1;" id="btnExport">📥 Xuất CSV</button>
                <button class="btn btn-outline" style="flex: 1; color: #ef4444;" id="btnClear">🗑️ Xóa hết</button>
            </div>
            <div class="card" id="tableWrapper">
                <div style="text-align: center; padding: 40px; color: #9ca3af;">Đang tải dữ liệu...</div>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Chỉnh sửa danh sách</h3>
        <input type="text" id="modalInput" style="margin: 15px 0; border: 1px solid #ddd;">
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-outline" id="btnCancelModal">Hủy</button>
            <button class="btn btn-primary" style="width: auto;" id="btnSaveModal">Lưu</button>
        </div>
    </div>
</div>

<div id="toast">Thông báo</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 1. Cấu hình & Khởi tạo
    const firebaseConfig = JSON.parse(__firebase_config);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'khcn-default';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Trạng thái ứng dụng
    let state = {
        user: null,
        tasks: [],
        people: ['Nam', 'Trực', 'Đạt', 'Tùng'],
        selectedPerson: null,
        currentDate: new Date().toISOString().split('T')[0]
    };

    // 2. Xác thực (Rule 3)
    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (err) {
            console.error("Auth Error:", err);
            showToast("⚠️ Lỗi xác thực!");
        }
    };

    onAuthStateChanged(auth, (user) => {
        state.user = user;
        if (user) {
            document.getElementById('sync-status').innerHTML = '☁️ Đã đồng bộ';
            document.getElementById('sync-status').style.background = 'rgba(16, 185, 129, 0.2)';
            startListeners();
        }
    });

    initAuth();

    // 3. Listeners (Rule 1 & 2)
    function startListeners() {
        if (!state.user) return;

        // Listener cho Tasks
        const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
        onSnapshot(tasksRef, (snapshot) => {
            state.tasks = snapshot.docs.map(d => ({ docId: d.id, ...d.data() }));
            render();
        }, (err) => console.error("Snapshot Error:", err));

        // Listener cho Settings (Danh sách người)
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'people');
        onSnapshot(settingsRef, (snapshot) => {
            if (snapshot.exists()) {
                state.people = snapshot.data().list || state.people;
                renderPeople();
            }
        });
    }

    // 4. Các hàm xử lý dữ liệu
    async function addTask(name, task) {
        if (!state.user || !name || !task) return;
        const id = Date.now().toString();
        const taskDoc = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
        await setDoc(taskDoc, {
            id,
            name,
            task,
            date: state.currentDate,
            createdAt: new Date().toISOString()
        });
        showToast("Đã thêm thành công!");
    }

    async function updatePeopleList(newList) {
        if (!state.user) return;
        const ref = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'people');
        await setDoc(ref, { list: newList });
        showToast("Đã cập nhật danh sách!");
    }

    // 5. Giao diện & Tương tác
    function render() {
        const filtered = state.tasks
            .filter(t => t.date === state.currentDate)
            .sort((a, b) => b.id.localeCompare(a.id));

        const container = document.getElementById('tableWrapper');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #9ca3af;">Trống.</div>';
            return;
        }

        let html = '<div class="table-container"><table><thead><tr><th>Tên</th><th>Nhiệm vụ</th><th style="text-align:right"></th></tr></thead><tbody>';
        filtered.forEach(item => {
            html += `
                <tr>
                    <td style="font-weight:600; color:var(--primary)">${item.name}</td>
                    <td>${item.task}</td>
                    <td style="text-align:right">
                        <div class="action-btns" style="justify-content: flex-end">
                            <button class="btn-sm btn-edit" onclick="window.editTask('${item.docId}')">Sửa</button>
                            <button class="btn-sm btn-del" onclick="window.deleteTask('${item.docId}')">Xóa</button>
                        </div>
                    </td>
                </tr>
            `;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }

    function renderPeople() {
        const container = document.getElementById('peopleButtons');
        container.innerHTML = '';
        state.people.forEach(p => {
            const btn = document.createElement('button');
            btn.className = `btn-person ${state.selectedPerson === p ? 'selected' : ''}`;
            btn.textContent = p;
            btn.onclick = () => {
                state.selectedPerson = p;
                renderPeople();
            };
            container.appendChild(btn);
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Event Listeners cho UI
    document.getElementById('btnQuickAdd').onclick = () => {
        const val = document.getElementById('quickInput').value.trim();
        const parts = val.split(' ');
        if (parts.length < 2) return showToast("Sai định dạng!");
        addTask(parts[0], parts.slice(1).join(' '));
        document.getElementById('quickInput').value = '';
    };

    document.getElementById('btnManualAdd').onclick = () => {
        const task = document.getElementById('taskInput').value.trim();
        if (!state.selectedPerson) return showToast("Chọn người!");
        if (!task) return showToast("Nhập nhiệm vụ!");
        addTask(state.selectedPerson, task);
        document.getElementById('taskInput').value = '';
    };

    document.getElementById('dateInput').onchange = (e) => {
        state.currentDate = e.target.value;
        const d = new Date(state.currentDate);
        document.getElementById('dateDisplay').textContent = '📅 ' + d.toLocaleDateString('vi-VN');
        render();
    };

    document.getElementById('btnEditPeople').onclick = () => {
        document.getElementById('modalInput').value = state.people.join(', ');
        document.getElementById('editModal').classList.add('show');
    };

    document.getElementById('btnCancelModal').onclick = () => document.getElementById('editModal').classList.remove('show');

    document.getElementById('btnSaveModal').onclick = () => {
        const names = document.getElementById('modalInput').value.split(',').map(n => n.trim()).filter(n => n);
        updatePeopleList(names);
        document.getElementById('editModal').classList.remove('show');
    };

    document.getElementById('btnCopy').onclick = () => {
        const filtered = state.tasks.filter(t => t.date === state.currentDate);
        if(!filtered.length) return;
        let str = `TỔNG HỢP ${state.currentDate}\n`;
        filtered.forEach((t, i) => str += `${i+1}. ${t.name}: ${t.task}\n`);
        navigator.clipboard.writeText(str);
        showToast("Đã sao chép!");
    };

    document.getElementById('btnClear').onclick = async () => {
        if(!confirm("Xóa hết dữ liệu ngày này?")) return;
        const toDelete = state.tasks.filter(t => t.date === state.currentDate);
        for(let t of toDelete) {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.docId));
        }
    };

    // Global Window functions for inline HTML events
    window.deleteTask = async (id) => {
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id));
    };

    window.editTask = async (id) => {
        const t = state.tasks.find(x => x.docId === id);
        const newText = prompt("Sửa nhiệm vụ:", t.task);
        if(newText) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id), { task: newText }, { merge: true });
        }
    };

    // Khởi tạo ngày ban đầu
    const now = new Date();
    document.getElementById('dateInput').value = state.currentDate;
    document.getElementById('dateDisplay').textContent = '📅 ' + now.toLocaleDateString('vi-VN');
    renderPeople();
</script>

</body>
</html>
